name: Update issues snapshot

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup GitHub CLI
        uses: cli/cli-action@v2
      - name: Fetch issues as JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth status || true
          gh issue list --repo gruted/devops-ops-bot --json number,title,author,assignees,labels,createdAt,updatedAt,state,url --state open > issues.json
      - name: Generate README table
        run: |
          python - <<'PY'
import json
with open('issues.json') as f:
    issues=json.load(f)
lines=['| Number | Title | Author | Assignees | Labels | Created | Updated | URL |','|---:|---|---|---|---|---:|---:|---|']
for i in issues:
    assignees=','.join(i.get('assignees') or [])
    labels=','.join(i.get('labels') or [])
    lines.append(f"| {i['number']} | {i['title']} | {i.get('author')} | {assignees} | {labels} | {i.get('createdAt')} | {i.get('updatedAt')} | {i.get('url')} |")
open('README.md','r').close() if False else None
readme_head='''# gruted/openclaw-issues-status\n\nThis page is automatically generated. See issues.json for machine-readable output.\n\n'''
with open('README.md','w') as f:
    f.write(readme_head+'\n'.join(lines)+"\n")
PY
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issues.json README.md
          git commit -m "Update issues snapshot" || echo "No changes"
          git push || echo "Push failed"
